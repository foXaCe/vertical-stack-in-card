name: Bug Report
description: Report a bug in Vertical Stack In Card
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please provide as much detail as possible.
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.5.2
    validations:
      required: true
  - type: input
    id: card-version
    attributes:
      label: Card version
      placeholder: e.g. 1.0.1
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
        - Other
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome 124, Firefox 125, Safari 17
    validations:
      required: true
  - type: textarea
    id: bug-description
    attributes:
      label: Bug description
      description: What happens? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Card configuration (YAML)
      description: The card config that triggers the issue.
      render: yaml
  - type: textarea
    id: logs
    attributes:
      label: Browser console logs
      description: Open the browser dev tools console and paste any relevant errors.
      render: shell
