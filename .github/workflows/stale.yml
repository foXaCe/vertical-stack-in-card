name: Stale

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: stale
  cancel-in-progress: true

jobs:
  stale:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 60
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,help wanted"
          exempt-pr-labels: "pinned,security"
          stale-issue-message: "This issue has been inactive for 60 days. It will be closed in 14 days without further activity."
          stale-pr-message: "This pull request has been inactive for 60 days. It will be closed in 14 days without further activity."
          close-issue-message: "Closed automatically due to inactivity."
          close-pr-message: "Closed automatically due to inactivity."
