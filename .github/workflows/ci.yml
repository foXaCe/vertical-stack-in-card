name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Lint & validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Format check
        run: npm run format:check
      - name: Unit tests
        run: npm run test:coverage
      - name: Build
        run: npm run build
      - name: Bundle size budget
        run: |
          MAX=51200
          SIZE=$(stat -c%s dist/vertical-stack-in-card.js)
          echo "Bundle: ${SIZE} bytes (budget: ${MAX})"
          test "${SIZE}" -le "${MAX}"
      - name: Validate hacs.json
        run: |
          jq empty hacs.json
          jq -e '.filename and .name' hacs.json

  compat:
    name: Compat — Node 20 (engines floor)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
